<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Strike - EVOLVED MAP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        html, body { margin: 0; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; user-select: none; -webkit-touch-callout: none; touch-action: none; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; width: 100%; z-index: 10; }
        .hud-panel { background: rgba(0,0,0,0.6); padding: 10px; border-left: 4px solid #00d4ff; margin-bottom: 5px; backdrop-filter: blur(4px); display: inline-block; }
        #health-bar-bg { width: 200px; height: 15px; background: #333; margin-top: 5px; transform: skewX(-20deg); border: 1px solid #555; overflow: hidden; }
        #health-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0055, #ff5500); transition: width 0.1s; }
        #ammo-box { position: fixed; bottom: 20px; right: 20px; font-size: 35px; font-weight: 900; color: #00d4ff; text-shadow: 0 0 10px #00d4ff; z-index: 5; text-align: right; }
        #weapon-info { font-size: 14px; color: #fff; text-transform: uppercase; }
       
        #leaderboard { position: fixed; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.7); border: 1px solid #00d4ff; padding: 10px; width: 180px; font-family: monospace; z-index: 100; pointer-events: none; border-radius: 4px; }
        #leaderboard h3 { margin: 0 0 10px 0; font-size: 14px; color: #00d4ff; border-bottom: 1px solid #00d4ff; padding-bottom: 5px; text-transform: uppercase; }
        .leader-item { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 3px; }
        .is-me { color: #00d4ff; font-weight: bold; }

        #sniper-scope { position: fixed; inset: 0; border-radius: 50%; pointer-events: none; display: none; box-shadow: 0 0 0 1000px #000; border: 2px solid #555; background: radial-gradient(circle, transparent 30%, #000 80%); z-index: 20; }
        #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 4px; height: 4px; background: #00fff2; border-radius: 50%; pointer-events: none; box-shadow: 0 0 5px #00fff2; z-index: 21; }
        #hit-marker { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(45deg); width: 24px; height: 24px; border: 3px solid #ff0055; opacity: 0; transition: opacity 0.1s; pointer-events: none; border-left: none; border-top: none; z-index: 22; }
       
        #reload-msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 30px; color: #ff0055; font-weight: bold; display: none; text-shadow: 0 0 10px red; animation: blink 0.3s infinite; z-index: 25; }
        @keyframes blink { 50% { opacity: 0; } }
       
        #kill-feed { position: absolute; top: 150px; right: 20px; text-align: right; font-size: 14px; font-weight: bold; font-family: monospace; z-index: 10; }
        .kill-item { background: rgba(0,0,0,0.7); color: #fff; padding: 5px 10px; margin-bottom: 2px; border-right: 3px solid #00d4ff; animation: fadeout 4s forwards; }
        @keyframes fadeout { 0% { opacity:1; transform:translateX(20px); } 10% { transform:translateX(0); } 80% { opacity:1; } 100% { opacity:0; display:none; } }

        #login { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 100; background: radial-gradient(circle at center, #112 0%, #000 100%); }
        .box { background: rgba(20,20,30,0.9); padding: 50px; border: 1px solid #00d4ff; text-align: center; border-radius: 5px; box-shadow: 0 0 50px rgba(0, 212, 255, 0.2); }
        button { padding: 15px 40px; background: linear-gradient(45deg, #00d4ff, #0088aa); border: none; font-weight: 900; letter-spacing: 2px; cursor: pointer; color: #000; transition: transform 0.1s; text-transform: uppercase; margin: 10px; }
        button:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* MENU DE PAUSE */
        #pause-menu { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(8px); }
        .menu-box { background: #0a0a15; border: 2px solid #00d4ff; padding: 40px; border-radius: 10px; text-align: center; box-shadow: 0 0 30px rgba(0, 212, 255, 0.3); }
        .menu-box h2 { color: #00d4ff; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 30px; }
        .menu-btn { width: 250px; display: block; margin: 15px auto; }
        .menu-btn.red { background: linear-gradient(45deg, #ff0055, #aa0033); }

        #mobile-controls { display: none; position: absolute; inset: 0; z-index: 50; pointer-events: none; }
        .touch-zone { position: absolute; bottom: 50px; width: 150px; height: 150px; pointer-events: auto; }
        #stick-container { left: 30px; border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; background: rgba(0,0,0,0.2); }
        #stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: rgba(0, 212, 255, 0.5); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #look-zone { position: absolute; top: 0; right: 0; width: 50%; height: 100%; pointer-events: auto; z-index: 40; }
        .mob-btn { position: absolute; width: 70px; height: 70px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 50%; color: #fff; font-size: 24px; display: flex; align-items: center; justify-content: center; pointer-events: auto; touch-action: manipulation; user-select: none; }
        .mob-btn:active { background: #00d4ff; color: #000; transform: scale(0.9); }
        #btn-fire { bottom: 60px; right: 40px; width: 90px; height: 90px; border-color: #ff0055; background: rgba(255,0,85,0.2); font-size: 40px; z-index: 60; }
        #btn-jump { bottom: 180px; right: 40px; z-index: 60; }
        #btn-dash { bottom: 180px; right: 130px; border-color: #00ffcc; font-size: 20px; z-index: 60; }
        #btn-scope { bottom: 60px; right: 150px; font-size: 20px; z-index: 60; opacity: 0.3; }
        #btn-swap { bottom: 270px; right: 40px; font-size: 16px; border-color: #00ffcc; z-index: 60; }
        #btn-menu { top: 20px; left: 50%; transform: translateX(-50%); width: 100px; height: 40px; border-radius: 5px; font-size: 14px; border-color: #00d4ff; }

        #btn-invoke { bottom: 60px; left: 200px; border-color: #ffaa00; background: rgba(255, 170, 0, 0.2); color: #ffaa00; font-size: 24px; pointer-events: auto; z-index: 60; }
        #invoke-label { position: absolute; bottom: -25px; font-size: 10px; width: 100px; text-align: center; }

        #admin-console { position: fixed; bottom: 10px; left: 10px; background: rgba(0,0,0,0.8); border: 1px solid #ff0055; padding: 5px; z-index: 1000; display: none; }
        #admin-input { background: #000; border: 1px solid #ff0055; color: #0f0; width: 350px; font-family: monospace; outline: none; padding: 5px; }
        #admin-help-tip { font-size: 10px; color: #ff0055; margin-top: 5px; }
    </style>
</head>
<body>

<div id="login"><div class="box"><h1>NEON <span style="color:#00d4ff">STRIKE</span></h1><p style="color:#888; margin-bottom:20px;">EVOLVED MAP UPDATE</p><button id="btn-conn" onclick="connectToCloud()">DÉPLOIEMENT</button></div></div>

<div id="pause-menu">
    <div class="menu-box">
        <h2>PAUSE</h2>
        <button class="menu-btn" onclick="togglePause()">REPRENDRE</button>
        <button class="menu-btn" onclick="alert('Z/Q/S/D: Bouger\nEspace: Sauter\nShift: Dash\nClic Droit: Zoom Sniper\nF2: Admin')">COMMANDES</button>
        <button class="menu-btn red" onclick="location.reload()">QUITTER</button>
    </div>
</div>

<div id="ui">
    <div class="hud-panel"><div style="font-size:24px; font-weight:bold;">SCORE: <span id="score">0</span></div></div><br>
    <div class="hud-panel"><div>SANTÉ</div><div id="health-bar-bg"><div id="health-bar"></div></div></div>
</div>

<div id="leaderboard">
    <h3>Classement</h3>
    <div id="leaderboard-list"></div>
</div>

<div id="ammo-box">
    <div id="weapon-info">MITRAILLETTE</div>
    <span id="ammo-val">--</span> / <span id="ammo-max">--</span>
</div>
<div id="reload-msg">RECHARGEMENT...</div>
<div id="kill-feed"></div>
<div id="crosshair"></div>
<div id="sniper-scope"></div>
<div id="hit-marker"></div>

<div id="admin-console">
    <input type="text" id="admin-input" placeholder="Tapez une commande (ex: help)...">
    <div id="admin-help-tip">Tapez 'help' pour la liste complète.</div>
</div>

<div id="mobile-controls">
    <div id="stick-container" class="touch-zone"><div id="stick"></div></div>
    <div id="look-zone"></div>
    <div id="btn-fire" class="mob-btn">🔥</div>
    <div id="btn-jump" class="mob-btn">⬆️</div>
    <div id="btn-dash" class="mob-btn">⚡</div>
    <div id="btn-scope" class="mob-btn">🎯</div>
    <div id="btn-swap" class="mob-btn">SWAP</div>
    <div id="btn-menu" class="mob-btn" onclick="togglePause()">MENU</div>
</div>

<div id="btn-invoke" class="mob-btn" onclick="invokeBot()" style="display:none;">🤖<div id="invoke-label">500 PTS</div></div>

<script>
const KEYS_CONFIG = ['hoXqWQ.xS6MJA:4jw_S7dp30pIrB7Sm3tCM6S4WQa57PAqkPdp-WN-Ros'];
let scene, camera, renderer, playerGroup, yaw = 0, pitch = 0;
let ably, channel, myID, otherPlayers = {}, bullets = [], walls = [], bots = [], jumpPads = [];
let keysDown = {}, hp = 100, score = 0;
let lastShoot = 0, lastDash = 0, lastSync = 0;
let isReloading = false, isSniper = false, dashPower = 0;
let isPaused = false;
let audioCtx, vy = 0;
let currentGravity = -55; let currentJumpForce = 24; let jumpCount = 0;
let playerSpeedBase = 32;
let isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || (navigator.maxTouchPoints > 0);
let touchMove = { x: 0, y: 0 }, isFiring = false;
let adminMode = false, scanMode = false;
let adminEnabledByConsole = false;

window.admin = function() {
    adminEnabledByConsole = true;
    console.log("%c[ADMIN] Accès F2 déverrouillé.", "color: #ff0055; font-weight: bold;");
    return "Mode Admin activé. Appuyez sur F2 en jeu.";
};

const WEAPONS = [
    { name: "Mitraillette", ammo: 50, maxAmmo: 50, rate: 80, dmg: 6, speed: 200, color: 0xff00cc, spread: 0.05, count: 1, size: 0.6 },
    { name: "Fusil d'Assaut", ammo: 30, maxAmmo: 30, rate: 120, dmg: 12, speed: 180, color: 0x00ffcc, spread: 0, count: 1, size: 1 },
    { name: "Pompe de Combat", ammo: 8, maxAmmo: 8, rate: 800, dmg: 10, speed: 150, color: 0xffaa00, spread: 0.15, count: 7, size: 0.8 },
    { name: "Railgun Sniper", ammo: 5, maxAmmo: 5, rate: 1000, dmg: 85, speed: 400, color: 0xff00ff, spread: 0, count: 1, size: 1.2 },
    { name: "Canon Impulsion", ammo: 3, maxAmmo: 3, rate: 1500, dmg: 140, speed: 70, color: 0xff0033, spread: 0, count: 1, size: 3.5 }
];
let currentWeaponIdx = 0;

async function connectToCloud() {
    const btn = document.getElementById('btn-conn');
    btn.textContent = "CHARGEMENT..."; btn.disabled = true;
    myID = "Ghost-" + Math.floor(Math.random()*999);
    initAudio();
    try {
        ably = new Ably.Realtime({ key: KEYS_CONFIG[0], clientId: myID });
        ably.connection.on('connected', async () => {
            channel = ably.channels.get('neon-elite');
            channel.subscribe('p', handleMessage);
            channel.presence.subscribe('leave', member => { removeRemote(member.clientId); });
            await channel.presence.enter();
            initGame();
            document.getElementById('login').style.display = 'none';
        });
    } catch (e) { alert("Erreur: " + e.message); btn.disabled = false; }
}

function handleMessage(m) {
    if (m.data.o === myID) return;
    const d = m.data;
    if (d.t === 'm') updateRemote(d);
    else if (d.t === 'f') { createBullet(d); playSound('laser', 0.2); }
    else if (d.t === 'h' && d.tgt === myID) { takeDamage(d.dmg, d.o); playSound('hit', 0.5); }
    else if (d.t === 'k') addKillFeed(d.killer, d.victim);
}

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type, vol=0.1) {
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    if(type==='shoot') { osc.type='square'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.1); gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.1); osc.start(); osc.stop(audioCtx.currentTime+0.1); }
    else if(type==='laser') { osc.type='sawtooth'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime+0.2); gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.2); osc.start(); osc.stop(audioCtx.currentTime+0.2); }
    else if(type==='jump') { osc.type='sine'; osc.frequency.setValueAtTime(200, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(400, audioCtx.currentTime+0.1); gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime+0.3); osc.start(); osc.stop(audioCtx.currentTime+0.3); }
    else if(type==='hit') { osc.type='sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime); gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.1); osc.start(); osc.stop(audioCtx.currentTime+0.1); }
    else if(type==='dash') { osc.type='triangle'; osc.frequency.setValueAtTime(50, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime+0.1); gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.15); osc.start(); osc.stop(audioCtx.currentTime+0.15); }
}

function initGame() {
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050a15, 0.005);
    camera = new THREE.PerspectiveCamera(80, window.innerWidth/window.innerHeight, 0.1, 2000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x050a15);
    document.body.appendChild(renderer.domElement);
   
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const sun = new THREE.DirectionalLight(0x00d4ff, 0.8);
    sun.position.set(50, 100, 50);
    scene.add(sun);
   
    buildMap();
    playerGroup = createPlayerMesh(0x00d4ff, false);
    playerGroup.position.set(0, 15, 0);
    scene.add(playerGroup);
   
    for(let i=0; i<4; i++) spawnBot();
    switchWeapon(0);
    setupInputs();

    if(isMobile) {
        document.getElementById('mobile-controls').style.display = 'block';
        document.getElementById('btn-invoke').style.display = 'flex';
        setupTouchControls();
    } else {
        document.getElementById('mobile-controls').style.display = 'none';
        const invokeBtn = document.getElementById('btn-invoke');
        invokeBtn.style.display = 'flex';
        invokeBtn.style.position = 'fixed';
        invokeBtn.style.bottom = '20px';
        invokeBtn.style.left = '20px';
    }
   
    loop();
}

function togglePause() {
    isPaused = !isPaused;
    const menu = document.getElementById('pause-menu');
    menu.style.display = isPaused ? 'flex' : 'none';
    if(!isPaused && !isMobile) renderer.domElement.requestPointerLock();
    else if(isPaused) document.exitPointerLock();
}

function createPlayerMesh(col, withHealthBar = true) {
    const g = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({ color: col, emissive: col, emissiveIntensity: 0.5 });
    const b = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.8, 0.5), mat); b.position.y = 0.9;
    const h = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), mat); h.position.y = 2.1;
    g.add(b, h);

    if (withHealthBar) {
        const hbGroup = new THREE.Group();
        const back = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 0.2), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
        const front = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 0.2), new THREE.MeshBasicMaterial({ color: 0x00ff00 }));
        front.position.z = 0.01;
        hbGroup.add(back, front); hbGroup.position.y = 2.8;
        g.add(hbGroup); g.healthBar = front; g.healthBarGroup = hbGroup;
    }
    return g;
}

function buildMap() {
    const grid = new THREE.GridHelper(2000, 200, 0x003366, 0x001122); scene.add(grid);
    createWall(0, -1, 0, 2000, 2000, 1, 0x050a15);
    createWall(0, 0, 0, 60, 60, 1, 0x00d4ff);
    createWall(-29, 1, 0, 2, 60, 20, 0x222244);
    createWall(29, 1, 0, 2, 60, 20, 0x222244);
    createWall(0, 1, -29, 60, 2, 20, 0x222244);
    createWall(-20, 1, 29, 22, 2, 20, 0x222244);
    createWall(20, 1, 29, 22, 2, 20, 0x222244);
    createWall(-15, 1, -15, 10, 10, 8, 0x00ffff);
    createWall(15, 1, 15, 10, 10, 8, 0x00ffff);
    createWall(0, 1, 0, 8, 8, 12, 0x00ffff);
    createJumpPad(0, 13, 0);
    createWall(-15, 20, 0, 30, 60, 1, 0x00d4ff);
    createWall(15, 20, 0, 30, 60, 1, 0x00d4ff);
    createWall(0, 20, -20, 10, 20, 1, 0x00d4ff);
    createWall(0, 20, 20, 10, 20, 1, 0x00d4ff);
    createWall(0, 20, -50, 10, 40, 1, 0xff00cc);
    createWall(0, 20, 50, 10, 40, 1, 0xff00cc);
    createWall(-50, 20, 0, 40, 10, 1, 0xff00cc);
    createWall(50, 20, 0, 40, 10, 1, 0xff00cc);

    createWall(0, 0, -100, 100, 60, 1, 0xffff00);
    createWall(-49, 1, -100, 2, 60, 30, 0x444400);
    createWall(49, 1, -100, 2, 60, 30, 0x444400);
    createWall(0, 1, -129, 100, 2, 30, 0x444400);
    createWall(0, 31, -100, 102, 62, 1, 0xffff00);
    createWall(-30, 1, -90, 15, 10, 10, 0xffaa00);
    createWall(-30, 11, -90, 10, 8, 10, 0xffaa00);
    createWall(20, 1, -110, 12, 25, 15, 0xffaa00);
    createWall(0, 1, -95, 8, 8, 5, 0xffaa00);
    createJumpPad(-30, 21, -90);

    createWall(-60, 5, 80, 15, 15, 1, 0xff00cc);
    createWall(-35, 12, 100, 15, 15, 1, 0xff00cc);
    createWall(-10, 19, 80, 15, 15, 1, 0xff00cc);
    createWall(15, 26, 100, 15, 15, 1, 0xff00cc);
    createWall(40, 33, 80, 15, 15, 1, 0xff00cc);
    createWall(65, 40, 100, 25, 25, 1, 0xff00cc);
    createJumpPad(-60, 0, 80);

    const tDist = 120;
    const tPositions = [[tDist, tDist], [-tDist, tDist], [tDist, -tDist], [-tDist, -tDist]];
    tPositions.forEach(pos => {
        createWall(pos[0], 0, pos[1], 15, 15, 40, 0x00ffcc);
        createWall(pos[0], 40, pos[1], 25, 25, 1, 0xffffff);
        // MURS DE GARDE-CORPS ABAISSÉS
        createWall(pos[0], 40.5, pos[1]+12, 25, 1, 1, 0x555555);
        createWall(pos[0], 40.5, pos[1]-12, 25, 1, 1, 0x555555);
        createWall(pos[0]+12, 40.5, pos[1], 1, 25, 1, 0x555555);
        createWall(pos[0]-12, 40.5, pos[1], 1, 25, 1, 0x555555);
        createJumpPad(pos[0] > 0 ? pos[0]-15 : pos[0]+15, 0, pos[1]);
    });

    for(let i=0; i<40; i++) {
        let x = (Math.random() > 0.5 ? -1 : 1) * (70 + Math.random()*80);
        let z = (Math.random()-0.5)*200;
        let w = 10 + Math.random()*15;
        let d = 10 + Math.random()*15;
        let h = 10 + Math.random()*30;
        let col = Math.random() > 0.5 ? 0x00ffcc : 0xff00ff;
        createWall(x, 0, z, w, d, h, col);
        if(Math.random() > 0.7) createJumpPad(x + w/2 + 3, 0, z);
    }

    const limit = 250;
    createWall(0, 0, limit, limit*2, 10, 100, 0x111122);
    createWall(0, 0, -limit, limit*2, 10, 100, 0x111122);
    createWall(limit, 0, 0, 10, limit*2, 100, 0x111122);
    createWall(-limit, 0, 0, 10, limit*2, 100, 0x111122);
}

function createWall(x, y, z, w, d, h, color) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.1 }));
    m.position.set(x, y + h/2, z);
    scene.add(m);
    walls.push({ minX: x-w/2, maxX: x+w/2, minZ: z-d/2, maxZ: z+d/2, minY: y, maxY: y+h });
}

function createJumpPad(x, y, z) {
    const m = new THREE.Mesh(new THREE.CylinderGeometry(3, 3, 0.5, 16), new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.8 }));
    m.position.set(x, y + 0.25, z);
    scene.add(m);
    jumpPads.push({ x, z, y: y, radius: 4 });
}

function spawnBot() {
    const bot = {
        id: "Bot-" + Math.floor(Math.random()*1000),
        mesh: createPlayerMesh(0xffff00, true),
        hp: 80, maxHp: 80, vy: 0,
        lastShoot: 0,
        dir: new THREE.Vector3(Math.random()-0.5, 0, Math.random()-0.5).normalize(),
        changeDirAt: Date.now() + 2000
    };
    bot.mesh.position.set((Math.random()-0.5)*150, 20, (Math.random()-0.5)*150);
    scene.add(bot.mesh); bots.push(bot);
}

function invokeBot() {
    if(score >= 500) {
        score -= 500;
        document.getElementById('score').textContent = score;
        spawnBot();
        addKillFeed("SUMMON", "Nouveau Bot !");
        playSound('laser', 0.5);
    } else { alert("Pas assez de points ! (Besoin de 500)"); }
}

function checkWall(x, y, z) {
    for (let w of walls) {
        if (x > w.minX - 0.4 && x < w.maxX + 0.4 && z > w.minZ - 0.4 && z < w.maxZ + 0.4) {
            if (y > w.minY && y < w.maxY) return true;
        }
    }
    return false;
}

function getFloorY(x, z, currentY) {
    let floor = 0;
    for (let w of walls) {
        if (x > w.minX - 0.4 && x < w.maxX + 0.4 && z > w.minZ - 0.4 && z < w.maxZ + 0.4) {
            if (currentY >= w.maxY - 0.5) floor = Math.max(floor, w.maxY);
        }
    }
    return floor;
}

function loop() {
    requestAnimationFrame(loop);
    const now = Date.now(), dt = 0.016;

    if(!isPaused) {
        if(isFiring) shoot();

        let moveSpeed = playerSpeedBase + dashPower; dashPower *= 0.9;
        const move = new THREE.Vector3();
       
        if (touchMove.x !== 0 || touchMove.y !== 0) {
            move.add(new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw)).multiplyScalar(-touchMove.y));
            move.add(new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw)).multiplyScalar(-touchMove.x));
        }
       
        if(keysDown['KeyW']) move.add(new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw)));
        if(keysDown['KeyS']) move.sub(new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw)));
        if(keysDown['KeyA']) move.add(new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw)));
        if(keysDown['KeyD']) move.sub(new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw)));
       
        if(move.length() > 0) {
            let s = move.clone().normalize().multiplyScalar(moveSpeed * dt);
            if(!checkWall(playerGroup.position.x + s.x, playerGroup.position.y + 1, playerGroup.position.z)) playerGroup.position.x += s.x;
            if(!checkWall(playerGroup.position.x, playerGroup.position.y + 1, playerGroup.position.z + s.z)) playerGroup.position.z += s.z;
        }

        vy += currentGravity * dt;
        let ground = getFloorY(playerGroup.position.x, playerGroup.position.z, playerGroup.position.y);
        playerGroup.position.y += vy * dt;
        if(playerGroup.position.y <= ground) { playerGroup.position.y = ground; vy = 0; jumpCount = 0; }
       
        jumpPads.forEach(pad => {
            let d = Math.sqrt((playerGroup.position.x-pad.x)**2 + (playerGroup.position.z-pad.z)**2);
            if(d < pad.radius && Math.abs(playerGroup.position.y - pad.y) < 2) { vy = 65; playSound('jump', 0.4); }
        });

        bots.forEach(bot => {
            bot.vy += currentGravity * dt;
            let bGround = getFloorY(bot.mesh.position.x, bot.mesh.position.z, bot.mesh.position.y);
            bot.mesh.position.y += bot.vy * dt;
            if(bot.mesh.position.y <= bGround) { bot.mesh.position.y = bGround; bot.vy = 0; }

            if (scanMode) bot.mesh.traverse(c => { if(c.isMesh) c.material.emissiveIntensity = 5; });
            else bot.mesh.traverse(c => { if(c.isMesh) c.material.emissiveIntensity = 0.5; });

            const dist = bot.mesh.position.distanceTo(playerGroup.position);
            if (dist < 60) {
                bot.mesh.lookAt(playerGroup.position.x, bot.mesh.position.y, playerGroup.position.z);
                if (now - bot.lastShoot > 1200) {
                    bot.lastShoot = now;
                    const d = playerGroup.position.clone().sub(bot.mesh.position).normalize();
                    createBullet({ t:'f', o: bot.id, x:bot.mesh.position.x, y:bot.mesh.position.y+1.8, z:bot.mesh.position.z, dx:d.x, dy:d.y, dz:d.z, spd:120, dmg:10, col:0xffff00, sz:1 });
                }
            } else {
                if (now > bot.changeDirAt || checkWall(bot.mesh.position.x + bot.dir.x, bot.mesh.position.y + 1, bot.mesh.position.z + bot.dir.z)) {
                    bot.dir.set(Math.random()-0.5, 0, Math.random()-0.5).normalize();
                    bot.changeDirAt = now + 2000 + Math.random()*3000;
                }
                bot.mesh.position.x += bot.dir.x * 12 * dt;
                bot.mesh.position.z += bot.dir.z * 12 * dt;
                bot.mesh.rotation.y = Math.atan2(bot.dir.x, bot.dir.z);
            }
            if(bot.mesh.healthBarGroup) bot.mesh.healthBarGroup.lookAt(camera.position);
        });

        for(let i=bullets.length-1; i>=0; i--) {
            const b = bullets[i]; b.mesh.position.addScaledVector(b.dir, b.speed * dt);
            if(checkWall(b.mesh.position.x, b.mesh.position.y, b.mesh.position.z) || b.mesh.position.y < -50) { scene.remove(b.mesh); bullets.splice(i,1); continue; }
            const playerHitPos = playerGroup.position.clone().add(new THREE.Vector3(0, 1.4, 0));
            if(b.o === myID) {
                bots.forEach((bot, idx) => {
                    if(b.mesh.position.distanceTo(bot.mesh.position.clone().add(new THREE.Vector3(0,1.2,0))) < 2) {
                        bot.hp -= b.dmg; triggerHitMarker(); scene.remove(b.mesh); bullets.splice(i,1);
                        bot.mesh.healthBar.scale.x = Math.max(0, bot.hp/bot.maxHp);
                        if(bot.hp <= 0) { addKillFeed("Toi", "Bot"); scene.remove(bot.mesh); bots.splice(idx,1); setTimeout(spawnBot, 4000); }
                    }
                });
            } else if(b.mesh.position.distanceTo(playerHitPos) < 2.2) { takeDamage(b.dmg, b.o); scene.remove(b.mesh); bullets.splice(i,1); }
        }

        if(now - lastSync > 50) { channel.publish('p', { t:'m', o:myID, x:playerGroup.position.x, y:playerGroup.position.y, z:playerGroup.position.z, ry:yaw, score, hp }); lastSync = now; updateLeaderboard(); }
    }

    let curPitch = isSniper ? pitch : 0;
    camera.position.lerp(new THREE.Vector3(playerGroup.position.x - Math.sin(yaw)*13, playerGroup.position.y + (isSniper?1.8:8), playerGroup.position.z - Math.cos(yaw)*13), 0.2);
    camera.lookAt(
        playerGroup.position.x + Math.sin(yaw) * Math.cos(curPitch),
        playerGroup.position.y + (isSniper?1.8:4) + Math.sin(curPitch),
        playerGroup.position.z + Math.cos(yaw) * Math.cos(curPitch)
    );
   
    renderer.render(scene, camera);
}

function shoot() {
    const w = WEAPONS[currentWeaponIdx];
    if(isReloading) return;
    if(Date.now() - lastShoot < w.rate) return;
    if(!adminMode) { if(w.ammo <= 0) { reload(); return; } w.ammo--; document.getElementById('ammo-val').textContent = w.ammo; } else document.getElementById('ammo-val').textContent = "∞";
    lastShoot = Date.now(); playSound('shoot');
    let curPitch = isSniper ? pitch : 0;
    for(let i=0; i<w.count; i++) {
        const spread = (Math.random()-0.5) * w.spread;
        const d = {
            t:'f', o:myID, x:playerGroup.position.x, y:playerGroup.position.y+1.8, z:playerGroup.position.z,
            dx:Math.sin(yaw+spread)*Math.cos(curPitch), dy:Math.sin(curPitch), dz:Math.cos(yaw+spread)*Math.cos(curPitch),
            spd:w.speed, dmg:w.dmg, col:w.color, sz:w.size
        };
        channel.publish('p', d); createBullet(d);
    }
}

function reload() {
    if(isReloading || adminMode) return;
    isReloading = true; document.getElementById('reload-msg').style.display = 'block';
    setTimeout(() => {
        WEAPONS[currentWeaponIdx].ammo = WEAPONS[currentWeaponIdx].maxAmmo;
        document.getElementById('ammo-val').textContent = WEAPONS[currentWeaponIdx].ammo;
        document.getElementById('reload-msg').style.display = 'none';
        isReloading = false;
    }, 1500);
}

function takeDamage(d, id) {
    if(adminMode) return;
    hp -= d; document.getElementById('health-bar').style.width = Math.max(0, hp) + "%";
    if(hp <= 0) { hp = 100; playerGroup.position.set(0, 15, 0); addKillFeed(id, "Toi"); }
}

function createBullet(d) { const m = new THREE.Mesh(new THREE.BoxGeometry(0.3*d.sz, 0.3*d.sz, 1*d.sz), new THREE.MeshBasicMaterial({color:d.col})); m.position.set(d.x,d.y,d.z); m.lookAt(d.x+d.dx, d.y+d.dy, d.z+d.dz); scene.add(m); bullets.push({mesh:m, dir:new THREE.Vector3(d.dx,d.dy,d.dz), speed:d.spd, dmg:d.dmg, o:d.o}); }
function jump() { if(jumpCount < 2) { vy = currentJumpForce; jumpCount++; playSound('jump', 0.2); } }
function dash() { if(Date.now()-lastDash > 1000) { lastDash=Date.now(); dashPower=80; playSound('dash', 0.3); } }
function toggleScope() { if(currentWeaponIdx===3){ isSniper=!isSniper; camera.fov=isSniper?15:80; camera.updateProjectionMatrix(); document.getElementById('sniper-scope').style.display=isSniper?'block':'none'; playerGroup.visible=!isSniper; } }
function triggerHitMarker() { const hm = document.getElementById('hit-marker'); hm.style.opacity = 1; setTimeout(() => hm.style.opacity = 0, 100); }
function addKillFeed(k,v) { const d=document.createElement('div'); d.className='kill-item'; d.innerHTML=`${k} 🔪 ${v}`; document.getElementById('kill-feed').prepend(d); if(k==="Toi") score+=100; document.getElementById('score').textContent=score; }
function switchWeapon(i) {
    if(i<0 || i>=WEAPONS.length) return;
    isSniper = false; pitch = 0; camera.fov = 80; camera.updateProjectionMatrix();
    document.getElementById('sniper-scope').style.display = 'none'; playerGroup.visible = true;
    currentWeaponIdx=i; const w = WEAPONS[i];
    document.getElementById('weapon-info').textContent=w.name;
    document.getElementById('ammo-val').textContent= adminMode ? "∞" : w.ammo;
    document.getElementById('ammo-max').textContent= adminMode ? "∞" : w.maxAmmo;
}

function updateLeaderboard() { let p = [{id:"Toi", s:score, me:true}]; for(let id in otherPlayers) p.push({id, s:otherPlayers[id].score, me:false}); p.sort((a,b)=>b.s-a.s); document.getElementById('leaderboard-list').innerHTML = p.slice(0,5).map(x=>`<div class="leader-item ${x.me?'is-me':''}"><span>${x.id}</span><span>${x.s}</span></div>`).join(''); }
function updateRemote(d) { if(!otherPlayers[d.o]){ otherPlayers[d.o]={mesh:createPlayerMesh(0xff0055, true), score:0}; scene.add(otherPlayers[d.o].mesh); } otherPlayers[d.o].mesh.position.lerp(new THREE.Vector3(d.x,d.y,d.z), 0.2); otherPlayers[d.o].mesh.rotation.y = d.ry; otherPlayers[d.o].score = d.score; otherPlayers[d.o].mesh.healthBar.scale.x = d.hp/100; }
function removeRemote(id) { if(otherPlayers[id]){ scene.remove(otherPlayers[id].mesh); delete otherPlayers[id]; } }
function startFire() { if(isPaused) return; initAudio(); isFiring = true; }
function stopFire() { isFiring = false; }

function handleAdmin(cmd) {
    const parts = cmd.toLowerCase().split(' ');
    if(parts[0] === 'help') { alert("COMMANDES ADMIN : help, god, hp [n], score [n], gravity [n], jump [n], speed [n], scan"); return; }
    if(parts[0] === 'hp') { hp = parseInt(parts[1]) || 100; document.getElementById('health-bar').style.width = Math.min(100, hp) + "%"; }
    if(parts[0] === 'score') { score = parseInt(parts[1]) || 0; document.getElementById('score').textContent = score; }
    if(parts[0] === 'god') { adminMode = !adminMode; switchWeapon(currentWeaponIdx); }
    if(parts[0] === 'gravity') currentGravity = parseInt(parts[1]) || -55;
    if(parts[0] === 'speed') playerSpeedBase = parseInt(parts[1]) || 32;
    if(parts[0] === 'scan') scanMode = !scanMode;
}

function setupInputs() {
    window.onkeydown=e=>{
        if(e.code === 'Escape') { togglePause(); return; }
        if(isPaused) return;
        if(e.code === 'F2') {
            if(!adminEnabledByConsole) return;
            const con = document.getElementById('admin-console');
            con.style.display = con.style.display === 'none' ? 'block' : 'none';
            if(con.style.display === 'block') document.getElementById('admin-input').focus();
            return;
        }
        if(document.activeElement.id === 'admin-input') { if(e.code === 'Enter') { handleAdmin(document.activeElement.value); document.activeElement.value = ''; } return; }
        keysDown[e.code]=true;
        if(e.code==='Space') jump(); if(e.code==='KeyR') reload(); if(e.code==='ShiftLeft') dash();
        if(e.code.startsWith('Digit')) switchWeapon(parseInt(e.code.slice(-1))-1);
    };
    window.onkeyup=e=>keysDown[e.code]=false;
    document.onmousemove = e => {
        if(document.pointerLockElement && !isPaused) {
            yaw -= e.movementX * 0.003;
            if(isSniper) { pitch -= e.movementY * 0.003; pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch)); } else { pitch = 0; }
        }
    };
    window.onmousedown=e=>{ if(isPaused) return; if(document.pointerLockElement){ if(e.button===0) startFire(); if(e.button===2) toggleScope(); } else if(e.target.closest('.mob-btn') === null && e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') renderer.domElement.requestPointerLock(); };
    window.onmouseup=e=>{ if(e.button===0) stopFire(); };
}

function setupTouchControls() {
    const sz = document.getElementById('stick-container'), lz = document.getElementById('look-zone');
    sz.addEventListener('touchmove', e => { if(isPaused) return; e.preventDefault(); const t = e.touches[0], r = sz.getBoundingClientRect(), dx = t.clientX-(r.left+r.width/2), dy = t.clientY-(r.top+r.height/2); touchMove = { x: Math.max(-1, Math.min(1, dx/50)), y: Math.max(-1, Math.min(1, dy/50)) }; document.getElementById('stick').style.transform = `translate(calc(-50% + ${touchMove.x*50}px), calc(-50% + ${touchMove.y*50}px))`; }, {passive:false});
    sz.addEventListener('touchend', () => { touchMove = {x:0, y:0}; document.getElementById('stick').style.transform = `translate(-50%, -50%)`; });
    let lx = 0, ly = 0;
    lz.addEventListener('touchstart', e => { lx = e.touches[0].clientX; ly = e.touches[0].clientY; });
    lz.addEventListener('touchmove', e => {
        if(isPaused) return;
        const tx = e.touches[0].clientX; const ty = e.touches[0].clientY;
        yaw -= (tx-lx)*0.008;
        if(isSniper) { pitch -= (ty-ly)*0.008; pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch)); } else { pitch = 0; }
        lx = tx; ly = ty;
    }, {passive:false});
    document.getElementById('btn-fire').addEventListener('touchstart', startFire); document.getElementById('btn-fire').addEventListener('touchend', stopFire);
    document.getElementById('btn-jump').addEventListener('touchstart', jump);
    document.getElementById('btn-dash').addEventListener('touchstart', dash);
    document.getElementById('btn-scope').addEventListener('touchstart', toggleScope);
    document.getElementById('btn-swap').addEventListener('touchstart', () => switchWeapon((currentWeaponIdx+1)%5));
}
</script>
